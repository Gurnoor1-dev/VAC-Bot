<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: Arial, sans-serif;
  padding: 50px;
  background: #f4f6f9;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

.status {
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  background: #007bff;
  color: white;
}

.section {
  margin-top: 40px;
}

.label {
  font-weight: bold;
  margin-bottom: 6px;
}

.footer {
  margin-top: 60px;
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <div class="logo">VACompany™</div>
  <div class="status">{{STATUS}}</div>
</div>

<div class="section">
  <div class="label">Client Name</div>
  <div>{{CLIENT_NAME}}</div>
</div>

<div class="section">
  <div class="label">Product</div>
  <div>{{PRODUCT}}</div>
</div>

<div class="section">
  <div class="label">Order ID</div>
  <div>{{ORDER_ID}}</div>
</div>

<div class="footer">
  Generated on {{DATE}}
</div>

</div>

</body>
</html>
