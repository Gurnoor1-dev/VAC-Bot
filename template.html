<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: repeating-linear-gradient(
    45deg,
    #ff2e2e,
    #ff2e2e 40px,
    #f2f2f2 40px,
    #f2f2f2 80px
  );
}

.page {
  width: 794px;
  min-height: 1123px;
  margin: 60px auto;
  background: #0d47a1;
  border-radius: 40px;
  padding: 60px;
  box-sizing: border-box;
  color: #ffffff;
}

.title-small {
  font-size: 38px;
  letter-spacing: 4px;
  font-weight: bold;
}

.title-big {
  font-size: 90px;
  font-weight: 900;
  line-height: 90px;
}

.subtitle {
  text-align: center;
  margin-top: 30px;
  font-weight: bold;
}

.table {
  margin-top: 60px;
  border: 4px solid #ffffff;
}

.row {
  display: flex;
  border-bottom: 4px solid #ffffff;
}

.cell {
  flex: 1;
  padding: 30px;
  border-right: 4px solid #ffffff;
  font-size: 32px;
  font-weight: bold;
}

.cell:last-child {
  border-right: none;
}

.row:last-child {
  border-bottom: none;
}

.footer {
  margin-top: 40px;
  font-style: italic;
  text-align: center;
}
</style>
</head>
<body>

<div class="page">

<div class="title-small">VACOMPANY</div>
<div class="title-big">ORDER<br>SUMMARY*</div>

<div class="subtitle">VACOMPANY DEVELOPER TEAM</div>

<div class="table">

<div class="row">
  <div class="cell">CLIENT</div>
  <div class="cell">{{CLIENT_NAME}}</div>
</div>

<div class="row">
  <div class="cell">ORDER ID</div>
  <div class="cell">{{ORDER_ID}}</div>
</div>

<div class="row">
  <div class="cell">PRODUCT</div>
  <div class="cell">{{PRODUCT}}</div>
</div>

<div class="row">
  <div class="cell">REQUESTS</div>
  <div class="cell">{{REQUESTS}}</div>
</div>

</div>

<div class="footer">
* This File is auto Created by Bot.
</div>

</div>

</body>
</html>
